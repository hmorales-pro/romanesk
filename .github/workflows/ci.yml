name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build offline-only — aucune dépendance n'est fetchée pendant test/build
# au-delà des deps gérées par cargo / pnpm (eux-mêmes lockés).
#
# RUSTFLAGS volontairement permissif en pré-1.0 : les sous-modules ai/
# (P15.3) utilisent #![allow(unused_imports)] le temps qu'on fasse un
# cargo fix --allow-dirty global, et les deps Tauri 2 émettent des
# warnings unmaintained sur paste@1 qu'on ne peut pas résoudre tant que
# Tauri ne migre pas. On remet -D warnings au passage v1.0.
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Format Rust (rustfmt). Pas de deps système, ultra rapide.
  # ---------------------------------------------------------------------------
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Job 2 — Clippy sur tout le workspace, y compris les commandes Tauri.
  # Nécessite les deps système Tauri sur Linux pour que le crate
  # `romanesk-desktop` compile.
  # ---------------------------------------------------------------------------
  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            build-essential \
            curl \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Tauri 2 `generate_context!()` valide `frontendDist` au compile-time :
      # il faut donc avoir buildé le front avant clippy/test, sinon le proc
      # macro panique avec "The `frontendDist` configuration is set to
      # `../dist` but this path doesn't exist".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install front deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build front (vite)
        run: pnpm --filter @romanesk/desktop build
      # P15.9 : on dégrade -D warnings en simples avertissements jusqu'à la
      # passe globale 'cargo fix --allow-dirty + cargo clippy --fix' qu'on
      # fera au cap v1.0. Les warnings actuels viennent surtout des sous-
      # modules splittés en P15.3 (imports dupliqués), pas de vraies bugs.
      - run: cargo clippy --workspace --all-targets

  # ---------------------------------------------------------------------------
  # Job 3 — `cargo test --workspace` sur les 3 OS desktop cibles.
  # On installe les deps système Tauri uniquement sur Linux ; sur Mac et
  # Windows, l'écosystème est autonome (WebKit / WebView2 fournis).
  # La feature `offline-tests` désactive les tests qui exigent un service
  # externe (Ollama, etc.) — utile en CI air-gapped.
  # ---------------------------------------------------------------------------
  rust-test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            build-essential \
            curl \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Pré-build front (cf. note dans le job clippy ci-dessus) pour que
      # `tauri::generate_context!()` trouve `../dist` au compile-time.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install front deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build front (vite)
        run: pnpm --filter @romanesk/desktop build
      - run: cargo test --workspace --features offline-tests

  # ---------------------------------------------------------------------------
  # Job 4 — Build release du binaire desktop sur Linux.
  # Smoke build (pas de packaging — `bundle.active = false` dans
  # `tauri.conf.json`). Garantit que tout le pipeline front + back compile.
  # ---------------------------------------------------------------------------
  desktop-build:
    name: desktop release build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            build-essential \
            curl \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install front deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build front (vite)
        run: pnpm --filter @romanesk/desktop build
      - name: Build desktop binary (release)
        run: cargo build -p romanesk-desktop --release

  # ---------------------------------------------------------------------------
  # Job 5 — Front : typecheck + lint (pas de tests Vitest en Phase 0).
  # ---------------------------------------------------------------------------
  front-checks:
    name: pnpm typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  # ---------------------------------------------------------------------------
  # Job 6 — cargo audit (RustSec advisories).
  # Échoue uniquement sur les vulnérabilités, pas sur les warnings unmaintained.
  # ---------------------------------------------------------------------------
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run audit
        # On échoue uniquement sur les vraies vulnérabilités exploitables.
        # Liste blanche des advisories ignorées (toutes transitives, hors
        # de notre contrôle) :
        #
        # - RUSTSEC-2024-0436 : paste@1 unmaintained (transitive via Tauri 2).
        # - RUSTSEC-2023-0071 : Marvin Attack timing sidechannel dans
        #   rsa@0.9 (transitive via sqlx-mysql -> sqlx-macros-core).
        #   On n'utilise PAS MySQL dans Romanesk (sqlite-only) mais sqlx
        #   tire toujours sqlx-macros-core qui dépend de sqlx-mysql pour
        #   la résolution macro. Aucun fix amont disponible. Notre code
        #   ne fait pas de crypto RSA donc la timing attack ne nous est
        #   pas exploitable. À ré-évaluer si on ajoute du MySQL ou si
        #   un patch sort en amont.
        # - RUSTSEC-2024-0413 : atk gtk-rs unmaintained (transitive via
        #   tauri-plugin-shell sur Linux). Pas de fix : gtk-rs entier
        #   est en transition vers GTK4 mais tauri 2 utilise encore GTK3.
        # - RUSTSEC-2026-0194 + RUSTSEC-2026-0195 : quick-xml 0.39.2 DoS
        #   (quadratic runtime + unbounded namespace alloc). On a bumpé
        #   plist 1.9 -> 1.10 qui tire quick-xml 0.41 corrigée. Il reste
        #   une occurrence de quick-xml 0.39 via wayland-scanner 0.31 —
        #   utilitaire de génération de code compile-time (parse les
        #   .xml de protocoles Wayland embarqués dans les crates), jamais
        #   exécuté sur des entrées runtime. Surface d'attaque nulle en
        #   production. Bumper wayland-scanner demanderait de rebumper
        #   toute la chaîne wayland-* verrouillée par tao/tauri.
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  # ---------------------------------------------------------------------------
  # Job 7 — pnpm audit (npm advisories).
  # On fixe le seuil sur 'high' pour ne pas bloquer sur des low/moderate.
  # ---------------------------------------------------------------------------
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run audit
        run: pnpm audit --audit-level high
