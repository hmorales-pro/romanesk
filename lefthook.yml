pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt -- --check
    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings
    eslint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files}
    prettier:
      glob: "*.{ts,tsx,js,jsx,json,md,css,html}"
      run: pnpm exec prettier --check {staged_files}

commit-msg:
  commands:
    conventional:
      run: |
        # Conventional Commits léger : feat|fix|docs|refactor|chore|test|build|ci|perf|style + scope optionnel + ! optionnel
        head -1 "$1" | grep -qE "^(feat|fix|docs|refactor|chore|test|build|ci|perf|style)(\([a-z0-9-]+\))?!?: .{3,}"
